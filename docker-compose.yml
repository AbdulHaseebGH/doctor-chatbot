version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - conversation
      - memory
      - llm
    networks:
      - clinic-network

  conversation:
    build: ./conversation
    ports:
      - "8001:8001"
    depends_on:
      - memory
      - llm
    networks:
      - clinic-network

  memory:
    build: ./memory
    ports:
      - "8002:8002"
    volumes:
      - ./memory/data:/app/data
    networks:
      - clinic-network

  llm:
    build: ./llm
    ports:
      - "8003:8003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - clinic-network

networks:
  clinic-network:
    driver: bridge