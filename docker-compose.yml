# --------------------------------------------------------------------------
# docker-compose.yml — City Medical Clinic Chatbot
#
# Services:
#   - gateway:      API Gateway (port 8000) — routes requests, WebSocket proxy
#   - conversation:  Conversation Manager (port 8001) — prompt building, SNR
#   - memory:        Memory Service (port 8002) — SQLite, patient profiles
#   - llm:           LLM Engine (port 8003) — LM Studio wrapper
#   - asr:           Speech-to-Text (port 8004) — faster-whisper, int8 CPU
#   - tts:           Text-to-Speech (port 8005) — piper-tts, CPU
# --------------------------------------------------------------------------

version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - conversation
      - memory
      - llm
      - asr
      - tts
    networks:
      - clinic-network

  conversation:
    build: ./conversation
    ports:
      - "8001:8001"
    depends_on:
      - memory
      - llm
    networks:
      - clinic-network

  memory:
    build: ./memory
    ports:
      - "8002:8002"
    volumes:
      - ./memory/data:/app/data
    networks:
      - clinic-network

  llm:
    build: ./llm
    ports:
      - "8003:8003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - clinic-network

  # ── Voice Pipeline Services ──

  asr:
    build: ./asr
    ports:
      - "8004:8004"
    environment:
      - MODEL_SIZE=base
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - clinic-network

  tts:
    build: ./tts
    ports:
      - "8005:8005"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - clinic-network

networks:
  clinic-network:
    driver: bridge